[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Ongoing AI tagging of newly-uploaded images (also HTTP-callable for backfill).
[functions."ai-tag-cron"]
  schedule = "*/15 * * * *"

# Clean URL for the read-only public API (token-gated). Must precede the SPA
# fallback so /api/assets reaches the function, not index.html.
[[redirects]]
  from = "/api/assets"
  to = "/.netlify/functions/dam-api"
  status = 200
  force = true

# Token-gated AI image generation for external tools (e.g. a Framer component).
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/image-generate"
  status = 200
  force = true

# SPA fallback — all non-asset, non-function routes serve index.html so the
# client router (incl. /s/:token public share pages) works on hard refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
